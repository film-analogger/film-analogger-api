api_platform:
    version: 0.1.3
    title: Hello API Platform
    serializer:
        hydra_prefix: true
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin', 'X-LOCALE', 'Accept-Language']
    oauth:
        enabled: true
        clientId: '%env(OAUTH_KEYCLOAK_CLIENT_ID_SWAGGER)%'
        type: 'oauth2'
        flow: 'authorizationCode'
        authorizationUrl: '%env(OAUTH_KEYCLOAK_ISSUER)%/realms/%env(OAUTH_KEYCLOAK_REALM)%/protocol/openid-connect/auth'
        tokenUrl: '%env(OAUTH_KEYCLOAK_ISSUER)%/realms/%env(OAUTH_KEYCLOAK_REALM)%/protocol/openid-connect/token'