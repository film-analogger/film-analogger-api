# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    locale: en
    availableLocales:
        - en
        - fr

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    FilmAnalogger\FilmAnaloggerApi\:
        resource: '../src/'

    gedmo.mapping.driver.attribute:
        class: Gedmo\Mapping\Driver\AttributeReader

    # Gedmo Translatable Extension Listener
    gedmo.listener.translatable:
        class: FilmAnalogger\FilmAnaloggerApi\EventListener\TranslatableListener
        arguments:
            $defaultLocale: '%locale%'
        tags:
            - { name: doctrine_mongodb.odm.event_listener, event: 'postLoad' }
            - { name: doctrine_mongodb.odm.event_listener, event: 'postPersist' }
            - { name: doctrine_mongodb.odm.event_listener, event: 'preFlush' }
            - { name: doctrine_mongodb.odm.event_listener, event: 'onFlush' }
            - { name: doctrine_mongodb.odm.event_listener, event: 'loadClassMetadata' }
        calls:
            - [ setAnnotationReader, [ '@gedmo.mapping.driver.attribute' ] ]
            - [ setPersistDefaultLocaleTranslation, [ true ] ]

    # Gedmo Blameable Extension Listener
    gedmo.listener.blameable:
        class: Gedmo\Blameable\BlameableListener
        tags:
            - { name: doctrine_mongodb.odm.event_listener, event: 'prePersist' }
            - { name: doctrine_mongodb.odm.event_listener, event: 'onFlush' }
            - { name: doctrine_mongodb.odm.event_listener, event: 'loadClassMetadata' }
        calls:
            - [ setAnnotationReader, [ '@gedmo.mapping.driver.attribute' ] ]


        # Gedmo Timestampable Extension Listener
    gedmo.listener.timestampable:
        class: Gedmo\Timestampable\TimestampableListener
        tags:
            - { name: doctrine_mongodb.odm.event_listener, event: 'prePersist' }
            - { name: doctrine_mongodb.odm.event_listener, event: 'onFlush' }
            - { name: doctrine_mongodb.odm.event_listener, event: 'loadClassMetadata' }
        calls:
            - [ setAnnotationReader, [ '@gedmo.mapping.driver.attribute' ] ]
            - [ setClock, [ '@clock' ] ]



    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    FilmAnalogger\FilmAnaloggerApi\EventListener\LocaleEventListener:
        arguments:
            $translatableListener: '@gedmo.listener.translatable'
            $defaultLocale: '%locale%'
            $availableLocales: '%availableLocales%'

    FilmAnalogger\FilmAnaloggerApi\EventListener\GedmoExtensionsEventSubscriber:
        arguments:
            $blameableListener: '@gedmo.listener.blameable'
            $authorizationChecker: '@security.authorization_checker'
            $tokenStorage: '@security.token_storage'

    FilmAnalogger\FilmAnaloggerApi\Security\OAuthClient\KeycloakClient:
        arguments:
            $issuer: '%env(OAUTH_KEYCLOAK_ISSUER)%'
            $issuer_dev_override: '%env(OAUTH_KEYCLOAK_ISSUER_DEV_OVERRIDE)%'
            $realm: '%env(OAUTH_KEYCLOAK_REALM)%'

    FilmAnalogger\FilmAnaloggerApi\Security\KeycloakBearerUserProvider:
        arguments:
            $clientId: '%env(OAUTH_KEYCLOAK_CLIENT_ID)%'

    keycloak_bearer_authenticator:
        class: FilmAnalogger\FilmAnaloggerApi\Security\Authenticator\KeycloakBearerAuthenticator
